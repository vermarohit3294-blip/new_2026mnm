        // --- 1. GEMINI API SETUP ---
        // ⚠️ IF RUNNING LOCALLY IN YOUR OWN BROWSER: 
        // 1. Paste your real API key from Google AI Studio inside the empty quotes below.
        // 2. Change the modelName below from "gemini-2.5-flash-preview-09-2025" to "gemini-1.5-flash"
        const apiKey = ""; 
        const modelName = "gemini-2.5-flash-preview-09-2025";

        const gemini = {
            async call(prompt, isJson = false, schema = null, systemPrompt = "You are a highly knowledgeable travel and geography expert.") {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                
                const contents = Array.isArray(prompt) ? prompt : [{ parts: [{ text: prompt }] }];
                
                const payload = {
                    contents: contents,
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                if (isJson) {
                    payload.generationConfig = { responseMimeType: "application/json" };
                    if (schema) payload.generationConfig.responseSchema = schema;
                }

                let retries = 0;
                const delays = [1000, 2000, 4000, 8000, 16000];

                while (retries <= 5) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const data = await response.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        if (!text) throw new Error("No text found in API response.");
                        
                        if (isJson) {
                            try {
                                const cleanJsonText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                                return JSON.parse(cleanJsonText);
                            } catch (e) {
                                throw e;
                            }
                        }
                        return text.replace(/```html/gi, '').replace(/```/g, '').trim();
                    } catch (error) {
                        if (retries === 5) throw error;
                        await new Promise(resolve => setTimeout(resolve, delays[retries]));
                        retries++;
                    }
                }
            }
        };

                const root = document.getElementById('app-content');
                root.innerHTML = '';
                
                switch(this.state.page) {
                    case 'home': root.innerHTML = this.views.home(); break;
                    case 'countries': root.innerHTML = this.views.countries(); this.bindSearch(); break;
                    case 'detail': root.innerHTML = this.views.detail(this.state.country); break;
                    case 'compare': root.innerHTML = this.views.compare(); this.bindCompare(); break;
                    case 'quiz': root.innerHTML = this.views.quiz(); this.initQuiz(); break;
                    case 'about': root.innerHTML = this.views.about(); break;
                    case 'contact': root.innerHTML = this.views.contact(); break;
                    default: root.innerHTML = this.views.home();
                }
                
                this.loadWikiImages();
            },

            loadWikiImages: async function() {
                const elements = document.querySelectorAll('.wiki-image:not(.loaded)');
                for (let el of elements) {
                    const title = el.getAttribute('data-wiki-title');
                    if (!title) continue;
                    el.classList.add('loaded');
                    try {
                        const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&format=json&pithumbsize=1000&origin=*`);
                        const data = await res.json();
                        const pages = data.query.pages;
                        const pageId = Object.keys(pages)[0];
                        if (pageId !== "-1" && pages[pageId].thumbnail) {
                            el.src = pages[pageId].thumbnail.source;
                        }
                    } catch (error) {
                        console.warn(`Wiki image fetch failed for ${title}`);
                    }
                }
            },

            // --- 4. LOGIC & BINDINGS ---
            bindSearch: function() {
                const input = document.getElementById('searchInput');
                const grid = document.getElementById('countriesGrid');
                const filterBtns = document.querySelectorAll('.filter-btn');

                const renderCards = (query, continent) => {
                    let filtered = allCountries;
                    if(continent !== 'All') filtered = filtered.filter(c => c.continent === continent);
                    if(query) {
                        const q = query.toLowerCase();
                        filtered = filtered.filter(c => c.name.toLowerCase().includes(q) || c.capital.toLowerCase().includes(q));
                    }

                    if(filtered.length === 0) {
                        grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">No countries found matching "${query}"</div>`;
                        return;
                    }

                    grid.innerHTML = filtered.map(c => `
                        <div onclick="app.navigate('detail', {countryId: '${c.id}'})" class="bg-white dark:bg-darkCard rounded-xl shadow border border-gray-100 dark:border-gray-800 overflow-hidden cursor-pointer card-hover flex flex-col h-full">
                            <div class="h-32 bg-gray-200 relative">
                                <img src="${c.flag}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://flagcdn.com/w320/un.png'">
                            </div>
                            <div class="p-4 flex-grow flex flex-col justify-between">
                                <div><h3 class="font-bold text-lg mb-1 truncate" title="${c.name}">${c.name}</h3><p class="text-xs text-gray-500 mb-2">${c.capital}</p></div>
                                <div class="text-xs space-y-1"><p><i class="fa-solid fa-earth-americas w-4"></i> ${c.continent}</p><p><i class="fa-solid fa-users w-4"></i> ${c.population}</p></div>
                            </div>
                        </div>
                    `).join('');
                };

                renderCards('', this.state.filterContinent);

                if (input) {
                    input.addEventListener('input', (e) => {
                        this.state.search = e.target.value;
                        renderCards(this.state.search, this.state.filterContinent);
                    });
                }

                filterBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.state.filterContinent = e.target.dataset.continent;
                        filterBtns.forEach(b => { b.classList.remove('bg-primary', 'text-white'); b.classList.add('bg-gray-100', 'text-gray-700', 'dark:bg-gray-800', 'dark:text-gray-300'); });
                        e.target.classList.add('bg-primary', 'text-white'); e.target.classList.remove('bg-gray-100', 'text-gray-700', 'dark:bg-gray-800', 'dark:text-gray-300');
                        renderCards(this.state.search, this.state.filterContinent);
                    });
                });
            },

                let c2 = pool[Math.floor(Math.random()*pool.length)]; qs.push({ q: `Which country does this flag belong to? <br><img src="${c2.flag}" class="h-16 mt-4 rounded border inline-block shadow">`, opts: [c2.name, ...pool.filter(x=>x.id!==c2.id).sort(()=>0.5-Math.random()).slice(0,3).map(x=>x.name)].sort(()=>0.5-Math.random()), ans: c2.name });
                let c3 = pool[Math.floor(Math.random()*pool.length)]; qs.push({ q: `What is the official currency of ${c3.name}?`, opts: [c3.currencies, ...pool.filter(x=>x.id!==c3.id).sort(()=>0.5-Math.random()).slice(0,3).map(x=>x.currencies)].sort(()=>0.5-Math.random()), ans: c3.currencies });
                let c4 = pool[Math.floor(Math.random()*pool.length)]; qs.push({ q: `${c4.name} is located in which continent?`, opts: [c4.continent, ...["Asia", "Europe", "Africa", "North America", "South America", "Oceania"].filter(x=>x!==c4.continent).sort(()=>0.5-Math.random()).slice(0,3)].sort(()=>0.5-Math.random()), ans: c4.continent });
                let c5 = pool[Math.floor(Math.random()*pool.length)]; qs.push({ q: `The famous landmark '${c5.landmarks[0].name}' is located in which country?`, opts: [c5.name, ...pool.filter(x=>x.id!==c5.id).sort(()=>0.5-Math.random()).slice(0,3).map(x=>x.name)].sort(()=>0.5-Math.random()), ans: c5.name });
                this.quizQuestions = qs;
            },
            
            startQuiz: function(mode = 'standard') {
                this.quizMode = mode; this.currentQ = 0; this.score = 0;
                document.getElementById('quizSetup').classList.add('hidden');
                document.getElementById('quizResult').classList.add('hidden');
                document.getElementById('quizPlay').classList.remove('hidden');
                document.getElementById('quizScoreDisplay').innerText = `Score: 0`;
                if (mode === 'standard') {
                    document.getElementById('aiQuitBtn').classList.add('hidden');
                    this.initQuiz(); this.renderQuestion();
                } else {
                    document.getElementById('aiQuitBtn').classList.remove('hidden');
                    this.fetchAndRenderAiQuestion();
                }
            },

            fetchAndRenderAiQuestion: async function() {
                const loadingOverlay = document.getElementById('quizLoading');
                loadingOverlay.classList.remove('hidden');
                document.getElementById('quizProgress').innerText = `Question ${this.currentQ + 1} (Endless Mode)`;
                const prompt = `Generate a challenging trivia question about world geography, capitals, flags, or cultures. Ensure 'ans' matches an option.`;
                const schema = { type: "OBJECT", properties: { q: { type: "STRING" }, opts: { type: "ARRAY", items: { type: "STRING" } }, ans: { type: "STRING" } }, required: ["q", "opts", "ans"] };

                try {
                    const aiQ = await gemini.call(prompt, true, schema);
                    const opts = [...aiQ.opts].sort(() => 0.5 - Math.random());
                    document.getElementById('quizQuestion').innerHTML = "✨ " + this.escapeForHtml(aiQ.q);
                    
                    document.getElementById('quizOptions').innerHTML = opts.map(o => `
                        <button onclick="app.checkAnswer('${this.escapeForHtml(o)}', '${this.escapeForHtml(aiQ.ans)}')" 
                                class="block w-full text-left p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:bg-indigo-50 dark:hover:bg-indigo-900/40 transition font-medium">
                            ${this.escapeForHtml(o)}
                        </button>
                    `).join('');
                } catch (e) {
                    document.getElementById('quizQuestion').innerHTML = "Failed to load AI question.";
                    document.getElementById('quizOptions').innerHTML = `<button onclick="app.fetchAndRenderAiQuestion()" class="bg-indigo-600 text-white p-3 rounded-lg w-full">Retry ✨</button>`;
                } finally { loadingOverlay.classList.add('hidden'); }
            },
            
            renderQuestion: function() {
                const q = this.quizQuestions[this.currentQ];
                document.getElementById('quizProgress').innerText = `Question ${this.currentQ + 1} of ${this.quizQuestions.length}`;
                document.getElementById('quizQuestion').innerHTML = q.q;
                
                document.getElementById('quizOptions').innerHTML = q.opts.map(o => `
                    <button onclick="app.checkAnswer('${this.escapeForHtml(o)}', '${this.escapeForHtml(q.ans)}')" 
                            class="block w-full text-left p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition font-medium">
                        ${this.escapeForHtml(o)}
                    </button>
                `).join('');
            },

            checkAnswer: function(sel, ans) {
                if(sel === ans) { this.score++; document.getElementById('quizScoreDisplay').innerText = `Score: ${this.score}`; }
                this.currentQ++;
                if (this.quizMode === 'standard') {
                    if (this.currentQ < this.quizQuestions.length) this.renderQuestion();
                    else this.endAiQuiz();
                } else {
                    this.fetchAndRenderAiQuestion();
                }
            },

            endAiQuiz: function() {
                document.getElementById('quizPlay').classList.add('hidden');
                document.getElementById('quizResult').classList.remove('hidden');
                document.getElementById('quizScore').innerText = `${this.score}${this.quizMode === 'standard' ? ` out of 5` : ` in Endless Mode`}`;
            }
        };

        // --- THEME & TRANSLATE ---
        const toggleTheme = () => {
            const html = document.documentElement;
            if (html.classList.contains('dark')) { html.classList.remove('dark'); localStorage.theme = 'light'; } 
            else { html.classList.add('dark'); localStorage.theme = 'dark'; }
        };

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        document.getElementById('theme-toggle-mobile').addEventListener('click', toggleTheme);

        const toggleMobileMenu = () => document.getElementById('mobile-menu').classList.toggle('hidden');
        document.getElementById('mobile-menu-btn').addEventListener('click', toggleMobileMenu);

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
            new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element_mobile');
        }
        const script = document.createElement('script');
        script.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
        document.body.appendChild(script);

        window.addEventListener('DOMContentLoaded', () => app.navigate('home'));

    </script>
</body>
</html>
